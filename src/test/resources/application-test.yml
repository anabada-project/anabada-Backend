spring:
  datasource:
    url: jdbc:h2:mem:anabada-test;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect
    show-sql: false

  data:
    redis:
      host: localhost
      port: 6379

  mail:
    host: localhost
    port: 1025
    username: test@example.com
    password: test-password
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

email-auth:
  mock-send: true
