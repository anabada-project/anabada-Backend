spring:
  # MySQL - 학교 서버
  datasource:
    url: jdbc:mysql://localhost:3306/anabada?useSSL=false&characterEncoding=UTF-8&serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true
    username: root
    password: wnstn4304!
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: validate    # 운영은 절대 auto DDL 금지
    show-sql: false         # 운영은 SQL 로그 끔

  # Redis - 학교 서버
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 10
          max-idle: 5
          min-idle: 2

  # Gmail SMTP - 운영 실제 발송
  mail:
    host: smtp.gmail.com # 인증번호를 받을 계쩡
    port: 587 # smtp 서버의 포트 번호
    username: smileksa13@gmail.com #
    password: wwsv qlht aexj ibku    # Gmail 앱 비밀번호 (2단계 인증 후 발급)
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connection-timeout: 5000
          timeout: 5000
          write-timeout: 5000

# 운영 로그 (INFO 레벨로 최소화)
logging:
  level:
    com.anabada: INFO
    org.hibernate.SQL: WARN
    root: WARN
  file:
    name: /var/log/anabada/app.log   # 학교 서버 로그 파일 경로
  logback:
    rollingpolicy:
      max-file-size: 100MB
      max-history: 30

# 운영은 실제 이메일 발송
email-auth:
  mock-send: false
