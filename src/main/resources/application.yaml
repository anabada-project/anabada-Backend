spring:
  application:
    name: anabada

  profiles:
    active: local  # 로컬 개발 시 기본값, 서버에서는 prod로 override

  # JPA 공통 설정
  jpa:
    hibernate:
      ddl-auto: validate   # prod 안전: 스키마 변경 없이 검증만
    properties:
      hibernate:
        format_sql: true
        default_batch_fetch_size: 100
    open-in-view: false

  # 파일 업로드 제한
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 30MB

server:
  port: 8080
  servlet:
    context-path: /

# 공통 로그 설정
logging:
  level:
    com.anabada: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE

# Swagger UI 설정
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
  default-consumes-media-type: application/json
  default-produces-media-type: application/json

# 이메일 인증 설정 (커스텀 프로퍼티)
email-auth:
  code-ttl: 300       # 인증코드 유효시간 (초) - 5분
  verified-ttl: 600   # 인증 완료 후 유지시간 (초) - 10분
  code-length: 6      # 인증코드 자리수
