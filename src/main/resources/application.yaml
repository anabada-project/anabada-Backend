spring:
  application:
    name: anabada-backend

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: update

    properties:
      hibernate:
        show_sql: true
        format_sql: true

    open-in-view: false

server:
  port: ${SERVER_PORT:8080}

logging:
  level:
    org.hibernate.SQL: debug